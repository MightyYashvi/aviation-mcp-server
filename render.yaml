services:
  - type: web
    name: aviation-field-report-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set this in the Render dashboard (secret)
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
